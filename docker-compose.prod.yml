version: '3.8'

services:
  db:
    image: mysql:8.0
    platform: linux/x86_64
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/sierrabonita/dco-rails-api:latest
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails db:prepare && bundle exec puma -C config/puma.rb -b tcp://0.0.0.0:3000"
    env_file:
      - .env
    environment:
      RAILS_ENV: production
      DATABASE_HOST: db
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - web
    restart: always

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
volumes:
  mysql_data: